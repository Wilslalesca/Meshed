name: Test CI

on:
  push:
  pull_request:

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install Dependancies
        run: npm ci
      - name: Linter
        run: npx turbo run lint
      #- run: npm run build --if-present
      #- run: npm test